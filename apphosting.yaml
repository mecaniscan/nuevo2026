# Settings to manage and configure a Firebase App Hosting backend.
# https://firebase.google.com/docs/app-hosting/configure
runConfig:
  minInstances: 0
  maxInstances: 100
# Required for Next.js middleware feature.
# https://firebase.google.com/docs/app-hosting/backends/options#environment-variables
env:
  - variable: USE_FIREBASE_AUTH_EMULATOR
    value: 'false'
  - variable: NEXT_PUBLIC_USE_FIREBASE_AUTH_EMULATOR
    value: 'false'
  - variable: NEXT_PUBLIC_STORAGE_BUCKET
    value: 'studio-3565960860-31363.firebasestorage.app'
